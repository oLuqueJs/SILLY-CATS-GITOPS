apiVersion: apps/v1
kind: Deployment
metadata:
  name: silly-cats
  namespace: silly-cats-ns
  labels:
    app: silly-cats
    environment: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: silly-cats
  template:
    metadata:
      labels:
        app: silly-cats
        environment: prod
    spec:
      containers:
      - name: silly-cats
        image: ghcr.io/oluquejs/silly-cats:1.0.0
        ports:
        - name: http-app
          containerPort: 8080
