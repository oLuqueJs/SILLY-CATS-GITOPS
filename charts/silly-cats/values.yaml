environment: default

replicaCount: 1

image:
  repository: ghcr.io/oluquejs/silly-cats
  tag: "1.0.1"
  digest: ""

ingress:
  host: desafio.bonam.cc
  tls:
    enabled: true
    clusterIssuer: letsencrypt-staging
    secretName: silly-cats-tls

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

readinessProbe:
  initialDelaySeconds: 2
  periodSeconds: 5

livenessProbe:
  initialDelaySeconds: 10
  periodSeconds: 10