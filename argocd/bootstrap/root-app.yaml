apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/oLuqueJs/SILLY-CATS-GITOPS.git
    targetRevision: main
    path: argocd
    directory:
      recurse: true
      exclude: "{install/*,bootstrap/*}"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true