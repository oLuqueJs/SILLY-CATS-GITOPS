apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-routing
  namespace: argocd
spec:
  project: cluster-infra

  source:
    repoURL: https://github.com/oLuqueJs/SILLY-CATS-GITOPS.git
    targetRevision: main
    path: infrastructure/ingresses/argocd

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: false
      selfHeal: true